let done = new Set(JSON.parse(localStorage.getItem('sol_done') || '[]'));
let expanded = null;
let activePhase = 'all';
let searchQ = '';

function save() { try { localStorage.setItem('sol_done', JSON.stringify([...done])); } catch(e){} }

function renderStats() {
  const total = LEVELS.length;
  const comp = done.size;
  document.getElementById('prog').style.width = Math.round(comp/total*100)+'%';
  const phaseCounts = PHASES.map((_,i) => LEVELS.filter(l=>l.phase===i).length);
  const phaseDone = PHASES.map((_,i) => LEVELS.filter(l=>l.phase===i && done.has(l.id)).length);
  document.getElementById('stats').innerHTML = `
    <div class="stat-card"><div class="num">${comp}</div><div class="lbl">Completed</div></div>
    <div class="stat-card"><div class="num">${total - comp}</div><div class="lbl">Remaining</div></div>
    <div class="stat-card"><div class="num">${Math.round(comp/total*100)}%</div><div class="lbl">Progress</div></div>
    <div class="stat-card"><div class="num">${PHASES.length}</div><div class="lbl">Phases</div></div>
  `;
}

function renderLevels() {
  const el = document.getElementById('levels');
  const filtered = LEVELS.filter(l => {
    const phaseMatch = activePhase === 'all' || l.phase === parseInt(activePhase);
    const q = searchQ.toLowerCase();
    const textMatch = !q || l.title.toLowerCase().includes(q) || l.sub.toLowerCase().includes(q) || (l.skills||[]).some(s=>s.toLowerCase().includes(q));
    return phaseMatch && textMatch;
  });

  let html = '';
  let lastPhase = -1;
  filtered.forEach(l => {
    if (l.phase !== lastPhase) {
      const p = PHASES[l.phase];
      html += `<div class="section-header"><span class="phase-dot" style="background:${p.dot}"></span>${p.name}</div>`;
      lastPhase = l.phase;
    }
    const p = PHASES[l.phase];
    const isDone = done.has(l.id);
    const isExp = expanded === l.id;
    html += `<div class="level-card${isDone?' done':''}${isExp?' expanded':''}" data-id="${l.id}">
      <div class="checkbox${isDone?' checked':''}" data-chk="${l.id}">${isDone?'✓':''}</div>
      <div class="level-main">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
          <span class="level-num" style="background:${p.bg};color:${p.text}">L${l.id}</span>
          <span class="level-title">${l.title}</span>
        </div>
        <div class="level-sub">${l.sub}</div>
        <div class="level-detail${isExp?' open':''}">
          <div class="detail-section">
            <div class="ds-title">What you'll learn</div>
            <ul>${(l.skills||[]).map(s=>`<li>${s}</li>`).join('')}</ul>
          </div>
          <div class="detail-section">
            <div class="ds-title">Resources</div>
            <ul>${(l.resources||[]).map(r=>`<li>${r}</li>`).join('')}</ul>
          </div>
          <button class="ask-btn" data-ask="${l.id}">Ask Claude about Level ${l.id} ↗</button>
        </div>
      </div>
    </div>`;
  });
  el.innerHTML = html || '<div style="color:var(--color-text-secondary);font-size:14px;padding:1rem 0;">No levels match your search.</div>';
}

document.getElementById('levels').addEventListener('click', e => {
  const chk = e.target.closest('[data-chk]');
  if (chk) {
    const id = parseInt(chk.dataset.chk);
    if (done.has(id)) done.delete(id); else done.add(id);
    save(); renderStats(); renderLevels(); return;
  }
  const ask = e.target.closest('[data-ask]');
  if (ask) {
    const id = parseInt(ask.dataset.ask);
    const l = LEVELS[id];
    sendPrompt(`Teach me Level ${id}: "${l.title}" — give me a structured study plan, key concepts, code examples, and mini-project ideas for this level.`);
    return;
  }
  const card = e.target.closest('[data-id]');
  if (card) {
    const id = parseInt(card.dataset.id);
    expanded = (expanded === id) ? null : id;
    renderLevels();
  }
});

document.querySelector('.filter-row').addEventListener('click', e => {
  const btn = e.target.closest('.phase-btn');
  if (!btn) return;
  document.querySelectorAll('.phase-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activePhase = btn.dataset.phase;
  renderLevels();
});

document.getElementById('search').addEventListener('input', e => {
  searchQ = e.target.value;
  renderLevels();
});

renderStats();
renderLevels();
</script>
